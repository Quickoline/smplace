# API — api.elizble.com → Node (port 5000)
# After DNS points here: sudo cp to sites-available, enable, nginx -t, then certbot (see Website/deploy/certbot-elizble.sh)
# Disable any other site that uses "listen 80 default_server" for _ if it steals ACME traffic.

upstream smplace_api {
    server 127.0.0.1:5000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.elizble.com;

    client_max_body_size 25m;

    location / {
        proxy_pass http://smplace_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
