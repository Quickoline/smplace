# Place in /etc/nginx/sites-available/smplace (Debian/Ubuntu)
# sudo ln -sf /etc/nginx/sites-available/smplace /etc/nginx/sites-enabled/smplace
# sudo rm -f /etc/nginx/sites-enabled/default   # optional: avoid default site stealing port 80
# sudo nginx -t && sudo systemctl reload nginx

upstream smplace_node {
    server 127.0.0.1:5000;
    keepalive 64;
}

server {
    # Catch all HTTP on this VPS (by IP or domain) so traffic does not fall through to nginx default site (404 HTML).
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 25m;

    location / {
        proxy_pass http://smplace_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Socket.io
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
